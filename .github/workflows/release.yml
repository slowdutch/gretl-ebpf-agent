name: Release gretl-ebpf

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch:   amd64
          - target: aarch64-unknown-linux-musl
            arch:   arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + BPF target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rust-src

      - name: Install clang and Zig
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang python3-pip
          pip3 install ziglang

      - name: Cache bpf-linker and cargo-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-tools-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo tools
        run: |
          command -v bpf-linker   || cargo install bpf-linker
          command -v cargo-zigbuild || cargo install cargo-zigbuild

      - name: Build
        run: |
          cargo zigbuild \
            --release \
            --target ${{ matrix.target }} \
            --package gretl-ebpf-agent

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/gretl-ebpf \
             gretl-ebpf-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gretl-ebpf-linux-${{ matrix.arch }}
          path: gretl-ebpf-linux-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: gretl-ebpf-linux-*
          generate_release_notes: true

      - name: Publish to gretl.dev/releases/
        env:
          DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          for arch in amd64 arm64; do
            curl -fsSL -X PUT \
              -H "Authorization: Bearer $DEPLOY_KEY" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@gretl-ebpf-linux-${arch}" \
              "https://api.gretl.dev/releases/upload?name=gretl-ebpf-linux-${arch}"
          done
